User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600
PidFile "/tmp/tinyproxy.pid"
LogFile "/tmp/tinyproxy.log"
LogLevel Info

# Only allow HTTPS tunneling (CONNECT) to port 443 — no CONNECT to ssh/smtp/etc.
ConnectPort 443

# Allowlist: deny every destination host EXCEPT those matching the filter file.
# This is the egress floor — the agent can reach the model API and nothing else.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
