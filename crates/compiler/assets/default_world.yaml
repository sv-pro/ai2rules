# Default CLI world for the harness (PLAN.md E1.5).
#
# Authored at design time, compiled once into an immutable CompiledWorld. This
# is the single source of truth for the default world; `default_cli_world()`
# embeds it via include_str!.
world_id: dev-harness-default

actors:
  - { name: developer, kind: User }
  - { name: agent, kind: Model }
  - { name: shell, kind: ShellWorker }
  - { name: mcp, kind: McpServer }

data_classes: [Public, Workspace, Secret, Credential, Generated, External]

channels:
  - { name: user_cli, trust: Trusted, taint: false }
  - { name: workspace_files, trust: Untrusted, taint: true }
  - { name: shell_output, trust: SemiTrusted, taint: true }
  - { name: mcp_output, trust: Untrusted, taint: true }
  - { name: web_fetch, trust: Untrusted, taint: true }
  - { name: memory, trust: Derived, taint: false }

# Capability matrix: which action types each trust level may perform.
capabilities:
  - trust: Trusted
    actions: [Read, Write, Patch, Command, Pty, Mcp, Web, Memory]
  - trust: SemiTrusted
    actions: [Read, Write, Patch, Command]
  - trust: Untrusted
    actions: [Read]
  - trust: Derived
    actions: [Read]

base_actions:
  - name: read_workspace
    action_type: Read
    side_effect: Read
    schema:
      type: object
      required: [path]
      properties:
        path: { type: string, description: "Path to read" }
  - name: write_workspace
    action_type: Write
    side_effect: FilesystemWrite
    schema:
      type: object
      required: [path, content]
      properties:
        path: { type: string, description: "Path to write" }
        content: { type: string, description: "File contents" }
  - name: apply_patch
    action_type: Patch
    side_effect: FilesystemWrite
    schema:
      type: object
      required: [path, contents]
      properties:
        path: { type: string, description: "Path to write" }
        contents: { type: string, description: "Full file contents" }
  - name: run_command
    action_type: Command
    side_effect: Process
    schema:
      type: object
      required: [command]
      properties:
        command: { type: string, description: "Shell command string to run" }
  - name: run_command_network
    action_type: Command
    side_effect: Network
    schema:
      type: object
      required: [command]
      properties:
        command: { type: string, description: "Shell command string to run" }
  - name: run_command_destructive
    action_type: Command
    side_effect: Process
    approval_required: true
    schema:
      type: object
      required: [command]
      properties:
        command: { type: string, description: "Shell command string to run" }
  - name: run_command_unclassified
    action_type: Command
    side_effect: Network
    approval_required: true
    schema:
      type: object
      required: [command]
      properties:
        command: { type: string, description: "Shell command string to run" }
  - name: start_pty
    action_type: Pty
    side_effect: Process
    approval_required: true
  - name: call_mcp_tool
    action_type: Mcp
    side_effect: External
    backing: !McpServer { server: docs, tool: search }
    schema:
      type: object
      properties:
        query: { type: string, description: "Search query" }
  - name: fetch_web
    action_type: Web
    side_effect: Network
    schema:
      type: object
      required: [url]
      properties:
        url: { type: string, description: "URL to fetch" }
    # PACT L2 (arXiv:2605.11039): `url` is the authority-bearing destination.
    # Opting this action into the argument-level floor means a fetch is blocked
    # when the *url* is tainted, not merely when the session is. Actions without
    # arg_roles keep the ambient-taint floor unchanged.
    arg_roles:
      url: Target
  - name: update_memory
    action_type: Memory
    side_effect: Memory
    schema:
      type: object
      required: [key, value]
      properties:
        key: { type: string }
        value: { type: string }

scoped_capabilities:
  - name: read_repo_file
    base_action: read_workspace
    args:
      path: ActorInput
  - name: apply_workspace_patch
    base_action: apply_patch
    args:
      path: ActorInput
      contents: ActorInput
  - name: run_tests
    base_action: run_command
    args:
      command: !Literal pytest
  - name: git_status
    base_action: run_command
    args:
      command: !Literal "git status"
  - name: git_diff
    base_action: run_command
    args:
      command: !Literal "git diff"
  - name: git_commit
    base_action: run_command
    args:
      command: !Literal "git commit"
  # MCP call pinned to the docs/search server+tool (via call_mcp_tool's backing);
  # the actor may only supply the query.
  - name: call_known_mcp_tool
    base_action: call_mcp_tool
    args:
      query: ActorInput

command_classes:
  - action: run_command
    arg: command
    default_to: run_command_unclassified
    classes:
      - to: run_command_network
        patterns: ["curl ", "wget ", "nc ", "ncat ", "telnet ", "ssh ", "scp ", "sftp "]
      - to: run_command_destructive
        patterns: ["rm -rf", "rm -fr", "sudo ", "mkfs", "dd if=", ":(){"]

# Taint containment: tainted data cannot reach externally-effectful surfaces.
transition_policies:
  - { from_taint: Tainted, side_effect: Network, decision: Deny, rule: no_tainted_network }
  - { from_taint: Tainted, side_effect: External, decision: Deny, rule: no_tainted_external }
  - { from_taint: Tainted, side_effect: Credential, decision: Deny, rule: no_tainted_credential }
  - { from_taint: Tainted, side_effect: Memory, decision: Deny, rule: no_tainted_memory_write }
  - { from_taint: Tainted, side_effect: PersistentWrite, decision: Deny, rule: no_tainted_persistent_write }

budget:
  max_tokens_per_session: 1000000
  max_commands_per_task: 50
  command_timeout_ms: 60000

observability:
  redact:
    - "env.*_TOKEN"
    - "env.*_KEY"
    - "**/.env"
