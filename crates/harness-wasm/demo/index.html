<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Harness WASM engine — live decision matrix (E14)</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131823; --border: #232a39; --text: #d7dee9;
    --muted: #8a97ad; --accent: #5b9bff;
    --allow: #1f9d5c; --ask: #c9922b; --deny: #d2433a; --absent: #5a6679; --replan: #8a63d2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); }
  h1 { margin: 0 0 .25rem; font-size: 1.15rem; }
  header p { margin: 0; color: var(--muted); }
  header .badge { color: var(--accent); }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1.5rem; max-width: 1100px; }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  section h2 { margin: 0; padding: .6rem .9rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 1px solid var(--border); }
  textarea { width: 100%; height: 460px; resize: vertical; border: 0; background: transparent; color: var(--text); padding: .9rem; font: 12.5px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; outline: none; }
  .body { padding: .6rem .9rem 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: .35rem .5rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; }
  .pill { display: inline-block; padding: .05rem .5rem; border-radius: 999px; font-size: 12px; font-weight: 600; color: #fff; }
  .Allow { background: var(--allow); } .Ask { background: var(--ask); }
  .Deny { background: var(--deny); } .Absent, .UNKNOWN { background: var(--absent); } .Replan { background: var(--replan); }
  .rule { color: var(--muted); font: 11px ui-monospace, monospace; }
  .meta { color: var(--muted); margin: 0 0 .6rem; font-size: 12.5px; }
  .err { color: var(--deny); font: 12.5px ui-monospace, monospace; white-space: pre-wrap; padding: .9rem; }
</style>
</head>
<body>
<header>
  <h1>Harness WASM engine — live decision matrix</h1>
  <p>Editing the manifest re-runs the <span class="badge">real compiler + kernel</span>, compiled to WebAssembly, <span class="badge">entirely in this tab</span>. Engine v<span id="ver">…</span>.</p>
</header>
<main>
  <section>
    <h2>World manifest (YAML)</h2>
    <textarea id="yaml" spellcheck="false"></textarea>
  </section>
  <section>
    <h2>Kernel decision surface</h2>
    <div class="body" id="out">Loading the engine…</div>
  </section>
</main>

<script type="module">
  import init, { preview, default_world, version } from '../pkg-web/harness_wasm.js';

  const yamlEl = document.getElementById('yaml');
  const outEl = document.getElementById('out');

  function render() {
    let res;
    try { res = JSON.parse(preview(yamlEl.value)); }
    catch (e) { outEl.innerHTML = '<div class="err">engine error: ' + e + '</div>'; return; }

    if (!res.ok) { outEl.innerHTML = '<div class="err">' + res.error + '</div>'; return; }

    const rows = res.decisions.map(d => {
      const cell = v => `<span class="pill ${v.decision}">${v.decision}</span> <span class="rule">${v.rule}</span>`;
      return `<tr><td>${d.action}</td><td>${cell(d.clean)}</td><td>${cell(d.tainted)}</td></tr>`;
    }).join('');

    outEl.innerHTML =
      `<p class="meta">world <b>${res.world_id}</b> · hash <code>${res.manifest_hash}</code> · ${res.surface.length} projected tools</p>` +
      `<table><thead><tr><th>action</th><th>clean</th><th>tainted</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  await init();
  document.getElementById('ver').textContent = version();
  yamlEl.value = default_world();
  yamlEl.addEventListener('input', render);
  render();
</script>
</body>
</html>
